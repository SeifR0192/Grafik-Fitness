<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XFG — Generator Opisów Zajęć</title>
<link href="https://fonts.googleapis.com/css2?family=HK+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --xred:#c80000;--xblue:#146496;--xnavy:#052d46;
  --white:#fff;--gray-bg:#F2F4F6;--gray-line:#DDE1E7;
  --gray-mid:#8A93A0;--gray-dark:#3D4550;
  --font:'HK Grotesk',sans-serif;
}
body{font-family:var(--font);background:var(--gray-bg);color:var(--xnavy);min-height:100vh;display:flex;flex-direction:column}

#topbar{background:var(--xnavy);height:58px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.logo{font-weight:800;font-size:19px;color:var(--white);display:flex;align-items:center;gap:5px}
.logo-x{color:var(--xred);font-size:23px}
.logo span{color:var(--xblue)}
.sep{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:5px;border:none;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-blue{background:var(--xblue);color:white}.btn-blue:hover{background:#0e5080}

#main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 58px)}

#gen-sidebar{width:280px;background:white;border-right:1px solid var(--gray-line);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:14px;border-bottom:1px solid var(--gray-line)}
.sb-title{font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-mid);margin-bottom:10px}
.gen-filter-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.gen-filter-btn{padding:3px 9px;border-radius:4px;background:var(--gray-bg);border:1px solid var(--gray-line);font-size:11px;font-weight:600;cursor:pointer;color:var(--xnavy);transition:all .15s}
.gen-filter-btn.active{background:var(--xnavy);color:white;border-color:var(--xnavy)}
.ctrl-row{display:flex;gap:6px}
.ctrl-btn{flex:1;padding:5px;border-radius:4px;background:var(--gray-bg);border:1px solid var(--gray-line);font-size:11px;font-weight:600;cursor:pointer;color:var(--xnavy);font-family:var(--font);transition:all .15s;text-align:center}
.ctrl-btn:hover{border-color:var(--xblue);color:var(--xblue)}
.search-field{
  margin-bottom:10px;
}

.search-field label{
  display:block;
  font-size:10px;
  font-weight:700;
  color:var(--gray-mid);
  margin-bottom:4px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.search-field input{
  width:100%;
  padding:7px 9px;
  border:1px solid var(--gray-line);
  border-radius:5px;
  font-family:var(--font);
  font-size:12.5px;
  color:var(--xnavy);
  outline:none;
  background:var(--gray-bg);
}

.search-field input:focus{
  border-color:var(--xblue);
  background:white;
}

.class-pick-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--gray-line);cursor:pointer;transition:background .1s;user-select:none}
.class-pick-item:hover{background:var(--gray-bg)}
.class-pick-item.checked{background:#EBF5FA}
.pick-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pick-name{flex:1;font-size:12.5px;color:var(--xnavy);font-weight:500;line-height:1.2}
.pick-cat{font-size:10px;color:var(--gray-mid);margin-top:1px}
.pick-check{width:16px;height:16px;border:2px solid var(--gray-line);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s}
.class-pick-item.checked .pick-check{background:var(--xblue);border-color:var(--xblue);color:white}

#gen-canvas{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
#gen-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.count-badge{background:var(--xnavy);color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
.layout-toggle{display:flex;gap:2px;background:var(--gray-line);border-radius:6px;padding:2px}
.layout-btn{padding:4px 10px;border-radius:4px;border:none;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;background:none;color:var(--gray-mid);transition:all .15s}
.layout-btn.active{background:white;color:var(--xnavy);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.sync-info{font-size:11px;color:var(--gray-mid);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-line)}
.sync-dot.ok{background:#16a34a}
.sync-dot.err{background:var(--xred)}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#output-area{display:grid;gap:12px}
#output-area.layout-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
#output-area.layout-list{grid-template-columns:1fr}

.output-card{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid var(--gray-line)}
.output-card-header{padding:12px 14px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.output-card-cat-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:3px}
.output-card-name{font-weight:800;font-size:16px;color:white;line-height:1.1}
.output-card-body{padding:12px 14px}
.output-card-body ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:5px}
.output-card-body ul li{font-size:12px;color:var(--gray-dark);display:flex;gap:7px;line-height:1.4}
.output-card-body ul li::before{content:'✕';font-size:9px;margin-top:2px;flex-shrink:0;font-weight:700}

.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:60px 20px;color:var(--gray-mid);text-align:center;font-size:13px;line-height:1.6}

#loading-overlay{position:fixed;inset:0;background:var(--xnavy);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;transition:opacity .3s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{font-weight:800;font-size:24px;color:white;display:flex;align-items:center;gap:5px}
.loading-logo-x{color:var(--xred);font-size:28px}
.loading-logo span{color:var(--xblue)}
.loading-text{color:rgba(255,255,255,.6);font-size:13px}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--xred),var(--xblue));border-radius:2px;animation:load 1.2s ease-in-out infinite}
@keyframes load{0%{width:0%;margin-left:0}50%{width:80%;margin-left:10%}100%{width:0%;margin-left:100%}}

@media print{
  @page{margin:10mm;size:A4}
  html,body{height:auto!important;overflow:visible!important;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #topbar,#gen-sidebar,#gen-toolbar,#loading-overlay{display:none!important}
  #main{height:auto!important;overflow:visible!important;display:block!important}
  #gen-canvas{padding:0!important;background:white!important;overflow:visible!important;height:auto!important}
  #output-area{display:grid!important;gap:6px!important}
  #output-area.layout-grid{grid-template-columns:repeat(3,1fr)!important}
  #output-area.layout-list{grid-template-columns:1fr!important}
  .output-card{break-inside:avoid;box-shadow:none!important;border:1px solid #ddd!important}
  .output-card-header{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-logo">Generator opisów</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-text">Pobieranie bazy zajęć...</div>
</div>

<div id="topbar">
  <div class="logo">Generator Opisów</div>
  <div class="sep"></div>
  <div class="sync-info">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-label">Ładowanie...</span>
  </div>
  <button class="btn btn-blue" onclick="window.print()">🖨 Drukuj / PDF</button>
</div>

<div id="main">
  <div id="gen-sidebar">
    <div class="sb-section">
      <div class="sb-title">Filtruj kategorie</div>
      <div class="gen-filter-btns" id="cat-filters"></div>

        <div class="search-field">
          <label>Szukaj zajęć</label>
          <input type="search" id="class-search" placeholder="np. zumba, pilates..." oninput="renderPickList()">
        </div>

        <div class="ctrl-row">
          <div class="ctrl-btn" onclick="selectAllVisible()">Zaznacz widoczne</div>
          <div class="ctrl-btn" onclick="clearAll()">Odznacz wszystkie</div>
        </div>
    </div>
    <div id="pick-list"></div>
  </div>

  <div id="gen-canvas">
    <div id="gen-toolbar">
      <span class="count-badge" id="sel-count">0 zaznaczonych</span>
      <span class="sync-info" id="schedule-import-info" style="display:none"></span>
      <div class="layout-toggle">
        <button class="layout-btn active" onclick="setLayout('grid')">⊞ Siatka</button>
        <button class="layout-btn" onclick="setLayout('list')">☰ Lista</button>
      </div>
      <div class="sep"></div>
      <button class="btn btn-blue" onclick="window.print()">🖨 Drukuj / PDF</button>
    </div>
    <div id="output-area" class="layout-grid">
      <div class="empty-state">Zaznacz zajęcia z listy po lewej,<br>aby wygenerować ich opisy.</div>
    </div>
  </div>
</div>

<script>
const DB_URL = 'https://raw.githubusercontent.com/SeifR0192/Grafik-Fitness/main/descriptions.json';

const FALLBACK_CATEGORIES=[
  {id:'mind',label:'Body & Mind',color:'#5B8DD9'},
  {id:'dance',label:'Taneczne',color:'#D4559A'},
  {id:'spec',label:'Specjalistyczne',color:'#D4701F'},
  {id:'cycling',label:'Rowerowe',color:'#2AA68C'},
  {id:'cardio',label:'Cardio',color:'#C8292B'},
  {id:'strength',label:'Wzmacniające',color:'#4C6EAA'},
  {id:'express',label:'Express Class',color:'#E0A020'},
  {id:'outdoor',label:'Outdoor',color:'#3A9E5F'},
  {id:'xstart',label:'X Start',color:'#052d46'},
  {id:'other',label:'Inne',color:'#6B7888'}
];

let CATEGORIES=[...FALLBACK_CATEGORIES];

function getCat(catId){
  return CATEGORIES.find(cat=>cat.id===catId) || {
    id:'other',
    label:'Inne',
    color:'#6B7888'
  };
}

function catColor(catId){
  return getCat(catId).color;
}

function catLabel(catId){
  return getCat(catId).label;
}

let entries=[];
let selectedIds=new Set();
let activeCat='';
let currentLayout='grid';

async function loadDB(){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  try{
    const res=await fetch(DB_URL,{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();

      if(!Array.isArray(data.entries)){
        throw new Error('Nieprawidłowy format pliku');
      }

      entries=data.entries;

      if(Array.isArray(data.categories)&&data.categories.length){
        CATEGORIES=data.categories;
      }else{
        const usedCats=new Set(entries.map(entry=>entry.cat).filter(Boolean));
        CATEGORIES=FALLBACK_CATEGORIES.filter(cat=>usedCats.has(cat.id));

        if(!CATEGORIES.length){
          CATEGORIES=[...FALLBACK_CATEGORIES];
        }
      }

      const updated=data.savedAt?new Date(data.savedAt).toLocaleDateString('pl-PL'):'—';
    dot.className='sync-dot ok';
    lbl.textContent=`Baza aktualna · ${entries.length} zajęć · ${updated}`;
  }catch(err){
    dot.className='sync-dot err';
    lbl.textContent='Błąd pobierania bazy — sprawdź połączenie';
    entries=[];
    CATEGORIES=[...FALLBACK_CATEGORIES];
    document.getElementById('pick-list').innerHTML=
      '<div style="padding:20px;font-size:12px;color:var(--xred);line-height:1.6">Nie udało się pobrać bazy zajęć.<br>Sprawdź połączenie z internetem i odśwież stronę.</div>';
  }finally{
    document.getElementById('loading-overlay').classList.add('hidden');
    buildCatFilters();
    renderPickList();
    applyScheduleSelection();
  }
}

function buildCatFilters(){
  const used=new Set(entries.map(e=>e.cat).filter(Boolean));
  const container=document.getElementById('cat-filters');

  container.innerHTML=`<button class="gen-filter-btn active" data-cat="" onclick="setCat(this)">Wszystkie</button>`;

  CATEGORIES.forEach(cat=>{
    if(!used.has(cat.id))return;

    const btn=document.createElement('button');
    btn.className='gen-filter-btn';
    btn.dataset.cat=cat.id;
    btn.textContent=cat.label;
    btn.onclick=()=>setCat(btn);

    container.appendChild(btn);
  });
}
function setCat(btn){
  document.querySelectorAll('.gen-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  renderPickList();
}

function getVisibleEntries(){
  const query=document.getElementById('class-search')?.value.toLowerCase().trim() || '';

  const sorted=[...entries].sort((a,b)=>{
    return a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name,'pl');
  });

  let filtered=activeCat
    ? sorted.filter(e=>e.cat===activeCat)
    : sorted;

  if(query){
    filtered=filtered.filter(e=>e.name.toLowerCase().includes(query));
  }

  return filtered;
}

function normalizeClassName(name){
  return (name||'')
    .toLowerCase()
    .trim()
    .replace(/\s+/g,' ');
}

function applyScheduleSelection(){
  const info=document.getElementById('schedule-import-info');

  try{
    const raw=localStorage.getItem('xfg_schedule_class_names');

    if(!raw){
      if(info)info.style.display='none';
      return;
    }

    const data=JSON.parse(raw);
    const names=Array.isArray(data.names)?data.names:[];

    if(!names.length){
      if(info)info.style.display='none';
      return;
    }

    const scheduleNames=new Set(
      names.map(normalizeClassName).filter(Boolean)
    );

    let matchedCount=0;

    entries.forEach(entry=>{
      const entryName=normalizeClassName(entry.name);

      if(scheduleNames.has(entryName)){
        selectedIds.add(entry.id);
        matchedCount++;
      }
    });

    renderPickList();
    renderOutput();

    if(info){
      info.style.display='';
      info.textContent=`Zaczytano ${matchedCount} z ${scheduleNames.size} zajęć z grafiku`;
    }
  }catch(err){
    console.warn('Nie udało się zaczytać zajęć z grafiku:',err);

    if(info){
      info.style.display='';
      info.textContent='Nie udało się zaczytać zajęć z grafiku';
    }
  }
}

function renderPickList(){
  const filtered=getVisibleEntries();
  document.getElementById('pick-list').innerHTML=filtered.map(e=>`
    <div class="class-pick-item${selectedIds.has(e.id)?' checked':''}" onclick="togglePick('${e.id}')">
      <div class="pick-dot" style="background:${catColor(e.cat)}"></div>
      <div style="flex:1;min-width:0">
        <div class="pick-name">${e.name}</div>
        <div class="pick-cat">${catLabel(e.cat)}</div>
      </div>
      <div class="pick-check">${selectedIds.has(e.id)?'✓':''}</div>
    </div>`).join('') || '<div style="padding:16px;font-size:12px;color:var(--gray-mid)">Brak zajęć dla wybranego filtra.</div>';
}

function togglePick(id){
  selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
  renderPickList();renderOutput();
}
function selectAllVisible(){
  getVisibleEntries().forEach(e=>selectedIds.add(e.id));
  renderPickList();
  renderOutput();
}
function clearAll(){selectedIds.clear();renderPickList();renderOutput();}

function setLayout(l){
  currentLayout=l;
  document.getElementById('output-area').className='layout-'+l;
  document.querySelectorAll('.layout-btn').forEach((b,i)=>b.classList.toggle('active',i===(l==='grid'?0:1)));
}
function renderOutput(){
  document.getElementById('sel-count').textContent=`${selectedIds.size} zaznaczonych`;
  const area=document.getElementById('output-area');
  if(!selectedIds.size){
    area.innerHTML='<div class="empty-state">Zaznacz zajęcia z listy po lewej,<br>aby wygenerować ich opisy.</div>';
    return;
  }
  area.innerHTML=entries.filter(e=>selectedIds.has(e.id)).map(e=>{
    const c=catColor(e.cat);
    return`<div class="output-card">
      <div class="output-card-header" style="background:${c}">
        <div class="output-card-cat-label">${catLabel(e.cat).toUpperCase()}</div>
        <div class="output-card-name">${e.name}</div>
      </div>
      <div class="output-card-body">
        <ul>${e.bullets.map(b=>`<li style="color:${c}">${b}</li>`).join('')}</ul>
      </div>
    </div>`;
  }).join('');
}

loadDB();
</script>
</body>
</html>
